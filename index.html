<title>五行農民曆</title>
<style>
:root {
  --bg: #e8ebee;
  --ink: #2b2f36;
  --muted: rgba(43,47,54,0.45);
  --muted-strong: rgba(43,47,54,0.65);
  --shadow-dark: #c6cad0;
  --shadow-light: #ffffff;
  --good: #3f7350;
  --wealth: #b0975f;
  --career: #3f7350;
  --romance: #b1432f;
  --avoid: #233240;
  --el-jin: #b0975f;
  --el-mu: #3f7350;
  --el-shui: #233240;
  --el-huo: #b1432f;
  --el-tu: #a97b3f;
  --font-display: 'Archivo', 'Noto Sans TC', sans-serif;
  --font-body: 'Noto Sans TC', 'Archivo', system-ui, sans-serif;
}

* { box-sizing: border-box; }
::selection { background: var(--ink); color: var(--bg); }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

#ink-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: clamp(20px, 4vw, 48px);
  display: flex;
  flex-direction: column;
  gap: clamp(20px, 3vw, 32px);
  max-width: 1240px;
  margin: 0 auto;
}

.raised {
  box-shadow: 3px 3px 5px var(--shadow-dark), -3px -3px 5px var(--shadow-light);
}
.raised-lg {
  box-shadow: 5px 5px 9px var(--shadow-dark), -5px -5px 9px var(--shadow-light);
}
.pressed {
  box-shadow: inset 2px 2px 3px var(--shadow-dark), inset -2px -2px 3px var(--shadow-light);
}

.neu-btn { transition: box-shadow .15s ease-in-out, transform .15s ease-in-out, background-color .15s ease-in-out, color .15s ease-in-out; cursor: pointer; }
.neu-btn:hover, .neu-btn:active { box-shadow: inset 2px 2px 3px var(--shadow-dark), inset -2px -2px 3px var(--shadow-light) !important; transform: scale(0.97); }
.neu-btn:focus-visible { outline: 2px solid var(--good); outline-offset: 2px; }

/* ---------- 頂部：標題＋五行選擇 ---------- */

.topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.title-logo { height: clamp(56px, 8vw, 82px); width: auto; display: block; }

.element-picker { display: flex; align-items: center; gap: 14px; }
.element-picker-label { font: 700 12px/1 var(--font-body); letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
.element-chips { display: flex; gap: 10px; }
.chip {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  font: 700 14px/1 var(--font-body); background: var(--bg); color: var(--ink);
  transition: background-color .15s ease-in-out, color .15s ease-in-out, box-shadow .15s ease-in-out, transform .15s ease-in-out;
}
.chip.active { color: #f4f2ec; cursor: default; }
.chip.active:hover,
.chip.active:active {
  transform: none !important;
  box-shadow: inset 2px 2px 3px rgba(0,0,0,0.25), inset -1px -1px 2px rgba(255,255,255,0.15) !important;
}

/* ---------- 主體：月曆＋詳情 ---------- */

.main-row { display: flex; flex-wrap: wrap; gap: clamp(18px, 2.5vw, 28px); align-items: flex-start; }

.cal-col { display: flex; flex-direction: column; gap: 18px; order: 2; flex: 2 1 380px; min-width: 0; }
.detail-col { display: flex; flex-direction: column; gap: 18px; order: 1; flex: 1 1 280px; min-width: 0; }
@media (max-width: 760px) {
  .cal-col { order: 1 !important; }
  .detail-col { order: 2 !important; }
  .topbar { flex-direction: column; align-items: center; text-align: center; }
  .element-picker { flex-direction: column; }
  .detail-heading { text-align: center; }
}

.cal-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.cal-toolbar-group { display: flex; align-items: center; gap: 10px; }
.round-btn {
  width: 38px; height: 38px; border: none; background: var(--bg); border-radius: 50%;
  font: 16px/1 sans-serif; color: var(--ink); display: flex; align-items: center; justify-content: center;
  transition: background-color .15s ease-in-out, box-shadow .15s ease-in-out, transform .15s ease-in-out;
}
.pill-select-wrap {
  position: relative; background: var(--bg); border-radius: 28px; height: 38px;
  display: inline-flex; align-items: center; transition: box-shadow .15s ease-in-out;
}
.pill-select {
  font: 600 16px/1 var(--font-body); border: none; background: transparent; color: var(--ink);
  appearance: none; -webkit-appearance: none; cursor: pointer; height: 38px;
  padding: 0 28px 0 14px;
}
.pill-caret {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none; display: flex; align-items: center;
}
.pill-caret .icon { width: 12px; height: 12px; }
.pill-btn {
  border: none; background: var(--bg); border-radius: 50%; width: 38px; height: 38px;
  color: var(--ink); display: flex; align-items: center; justify-content: center;
  transition: background-color .15s ease-in-out, box-shadow .15s ease-in-out, transform .15s ease-in-out;
}

.cal-card { background: var(--bg); border-radius: 24px; padding: clamp(18px, 2.5vw, 28px); display: flex; flex-direction: column; gap: 18px; }
.weekday-row, .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.weekday-row span { text-align: center; font: 700 12px/1 var(--font-body); color: var(--muted); padding-bottom: 4px; letter-spacing: 0.04em; }

.day-wrap { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; cursor: pointer; padding: 2px 0; background: none; border: none; font: inherit; color: inherit; transition: opacity .15s ease-in-out; }
.day-wrap.out-of-month { opacity: 0.32; }
.day-cell {
  width: clamp(30px, 4.8vw, 40px); aspect-ratio: 1; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: background-color .15s ease-in-out, box-shadow .15s ease-in-out;
}
.day-cell.selected,
.day-wrap:hover .day-cell,
.day-wrap:active .day-cell {
  background: var(--bg);
  box-shadow: inset 1px 1px 2px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
}
.day-cell.today,
.day-wrap:hover .day-cell.today,
.day-wrap:active .day-cell.today {
  background: rgba(255, 255, 255, 0.4);
}
.day-num { font: 600 clamp(12px, 1.6vw, 15px)/1 var(--font-body); }
.day-dots { display: flex; gap: 3px; height: 5px; align-items: center; justify-content: center; margin-top: 4px; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

/* ---------- 詳情卡 ---------- */

.detail-eyebrow { font: 700 13px/1 var(--font-body); letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
.detail-title { font: 900 clamp(24px, 3vw, 30px)/1.2 var(--font-display); }

@keyframes detail-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.pillar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pillar-chip {
  background: var(--bg); border-radius: 14px; padding: 12px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.pillar-chip-label { font: 600 12px/1 var(--font-body); color: var(--muted); }
.pillar-chip-name { font: 700 18px/1 var(--font-display); font-variant-numeric: tabular-nums; }

.cat-list { display: flex; flex-direction: column; gap: 12px; }
.cat-card {
  background: var(--bg); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
  animation: detail-in .32s ease both;
}
.cat-card:nth-child(1) { animation-delay: .05s; }
.cat-card:nth-child(2) { animation-delay: .09s; }
.cat-card:nth-child(3) { animation-delay: .13s; }
.cat-card:nth-child(4) { animation-delay: .17s; }
.cat-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.cat-name { font: 700 15px/1 var(--font-body); display: flex; align-items: center; gap: 8px; }
.cat-stars { display: flex; align-items: center; gap: 2px; }
.cat-stars .icon-star { width: 15px; height: 15px; }
.cat-sub { font: 700 12px/1 var(--font-body); letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
.cat-checks { display: flex; gap: 8px; flex-wrap: wrap; }
.cat-check { display: flex; align-items: center; gap: 5px; font: 500 12px/1 var(--font-body); color: var(--muted-strong); background: var(--bg); border-radius: 8px; padding: 6px 10px; }
.cat-check .mark { display: inline-flex; }
.cat-check .mark .icon { width: 12px; height: 12px; }
.cat-check .mark.yes { color: var(--good); }
.cat-check .mark.no { color: var(--muted); }
.cat-hours { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
.hour-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.hour-chip { font: 500 12px/1 var(--font-body); background: var(--bg); border-radius: 8px; padding: 6px 10px; color: var(--muted-strong); }

.empty-note { font: 400 14px/1.6 var(--font-body); color: var(--muted); padding: 20px 4px; text-align: center; animation: detail-in .3s ease both; }

@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>

<script>
'use strict';

/* ===================== 水墨游標背景（依五行變色） ===================== */
(() => {
  const CONFIG = {
    simScale: 0.5,
    dissipation: 0.985,
    diffusion: 0.45,
    flowStrength: 0.0016,
    flowScale: 3.2,
    splatRadius: 0.032,
    splatStrength: 0.3,
    densityCurve: 2.1,
    maxAlpha: 0.85,
  };

  const canvas = document.getElementById('ink-canvas');
  const gl = canvas.getContext('webgl', {
    alpha: true,
    premultipliedAlpha: true,
    depth: false,
    stencil: false,
    antialias: false,
  });
  if (!gl) { console.warn('WebGL 不可用，略過水墨背景效果'); return; }

  const halfFloatExt = gl.getExtension('OES_texture_half_float');
  gl.getExtension('OES_texture_half_float_linear');
  const TEX_TYPE = halfFloatExt ? halfFloatExt.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  function program(fsSrc) {
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
    const uniforms = {};
    const count = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < count; i++) {
      const name = gl.getActiveUniform(p, i).name;
      uniforms[name] = gl.getUniformLocation(p, name);
    }
    return { p, u: uniforms };
  }

  const VS = `
    attribute vec2 aPos;
    varying vec2 vUv;
    void main() {
      vUv = aPos * 0.5 + 0.5;
      gl_Position = vec4(aPos, 0.0, 1.0);
    }`;

  const NOISE = `
    float hash(vec2 p) {
      p = fract(p * vec2(123.34, 456.21));
      p += dot(p, p + 34.45);
      return fract(p.x * p.y);
    }
    float vnoise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
    }
    float fbm(vec2 p) {
      float v = 0.0;
      float amp = 0.5;
      for (int i = 0; i < 4; i++) {
        v += amp * vnoise(p);
        p = p * 2.03 + vec2(17.3, 9.1);
        amp *= 0.5;
      }
      return v;
    }`;

  const advectFS = `
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uPrev;
    uniform vec2 uTexel;
    uniform float uTime;
    uniform float uDissipation;
    uniform float uDiffusion;
    uniform float uFlowStrength;
    uniform float uFlowScale;
    uniform float uAspect;
    ${NOISE}
    vec2 curl(vec2 p) {
      float e = 0.06;
      float n1 = fbm(p + vec2(0.0, e));
      float n2 = fbm(p - vec2(0.0, e));
      float n3 = fbm(p + vec2(e, 0.0));
      float n4 = fbm(p - vec2(e, 0.0));
      return vec2((n1 - n2), -(n3 - n4)) / (2.0 * e);
    }
    void main() {
      vec2 np = vec2(vUv.x * uAspect, vUv.y) * uFlowScale + uTime * 0.03;
      vec2 flow = curl(np) * uFlowStrength;
      vec2 np2 = vec2(vUv.x * uAspect, vUv.y) * uFlowScale * 7.0 - uTime * 0.05;
      flow += curl(np2) * uFlowStrength * 0.28;
      vec2 uv = vUv - flow;

      float c = texture2D(uPrev, uv).r;
      float l = texture2D(uPrev, uv - vec2(uTexel.x, 0.0)).r;
      float r = texture2D(uPrev, uv + vec2(uTexel.x, 0.0)).r;
      float b = texture2D(uPrev, uv - vec2(0.0, uTexel.y)).r;
      float t = texture2D(uPrev, uv + vec2(0.0, uTexel.y)).r;
      float d = mix(c, (l + r + b + t) * 0.25, uDiffusion);
      gl_FragColor = vec4(d * uDissipation, 0.0, 0.0, 1.0);
    }`;

  const splatFS = `
    precision highp float;
    varying vec2 vUv;
    uniform vec2 uPoint;
    uniform float uRadius;
    uniform float uStrength;
    uniform float uAspect;
    uniform float uSeed;
    ${NOISE}
    void main() {
      vec2 d = vUv - uPoint;
      d.x *= uAspect;
      float edge = fbm(vUv * 24.0 + uSeed) * 0.6 + 0.7;
      float g = exp(-dot(d, d) / (uRadius * uRadius * edge));
      gl_FragColor = vec4(g * uStrength, 0.0, 0.0, 1.0);
    }`;

  const displayFS = `
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uTex;
    uniform vec3 uColor;
    uniform float uCurve;
    uniform float uMaxAlpha;
    uniform float uAspect;
    ${NOISE}
    void main() {
      vec2 p = vec2(vUv.x * uAspect, vUv.y);
      vec2 wobble = vec2(fbm(p * 40.0), fbm(p * 40.0 + 55.0)) - 0.5;
      float d = texture2D(uTex, vUv + wobble * 0.007).r;

      float a = 1.0 - exp(-d * uCurve);
      float grain = fbm(p * 90.0) * 0.12;
      a = clamp(a - grain * a * (1.0 - a) * 2.0, 0.0, 1.0) * uMaxAlpha;
      float ring = smoothstep(0.05, 0.35, a) * (1.0 - smoothstep(0.35, 0.9, a));
      vec3 col = uColor * (1.0 - ring * 0.12);
      gl_FragColor = vec4(col * a, a);
    }`;

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

  function bindQuad(prog) {
    gl.useProgram(prog.p);
    const loc = gl.getAttribLocation(prog.p, 'aPos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  }

  const advectProg = program(advectFS);
  const splatProg = program(splatFS);
  const displayProg = program(displayFS);

  let simW = 0, simH = 0;
  let fboA = null, fboB = null;

  function createFBO(w, h) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, TEX_TYPE, null);
    const fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    return { fb, tex };
  }

  function resize() {
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = innerWidth * DPR;
    canvas.height = innerHeight * DPR;
    simW = Math.max(64, Math.round(canvas.width * CONFIG.simScale));
    simH = Math.max(64, Math.round(canvas.height * CONFIG.simScale));
    fboA = createFBO(simW, simH);
    fboB = createFBO(simW, simH);
  }
  resize();
  addEventListener('resize', resize);

  const splats = [];
  let lastX = null, lastY = null;

  function onMove(x, y) {
    const u = x / innerWidth;
    const v = 1 - y / innerHeight;
    if (lastX === null) { lastX = x; lastY = y; splats.push([u, v, 0]); return; }
    const dist = Math.hypot(x - lastX, y - lastY);
    if (dist < 5) return;
    const steps = Math.min(Math.ceil(dist / 14), 4);
    for (let i = 1; i <= steps; i++) {
      const ix = lastX + ((x - lastX) * i) / steps;
      const iy = lastY + ((y - lastY) * i) / steps;
      splats.push([ix / innerWidth, 1 - iy / innerHeight, Math.min(dist, 60)]);
    }
    lastX = x; lastY = y;
  }

  addEventListener('pointermove', e => onMove(e.clientX, e.clientY), { passive: true });
  addEventListener('touchmove', e => {
    const t = e.touches[0];
    if (t) onMove(t.clientX, t.clientY);
  }, { passive: true });

  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // 依五行變色：目標色 + 目前顯示色，每幀平滑趨近，避免切換五行時墨色瞬間跳變
  let targetColor = [0.10, 0.10, 0.13];
  let currentColor = targetColor.slice();

  function hexToRgb01(hex) {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex.trim());
    if (!m) return null;
    return [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255];
  }

  window.wuxingSetInkColor = function setInkColor(hex) {
    const rgb = hexToRgb01(hex);
    if (rgb) targetColor = rgb;
  };

  const start = performance.now();

  function frame() {
    const time = (performance.now() - start) * 0.001;
    const aspect = simW / simH;

    currentColor[0] += (targetColor[0] - currentColor[0]) * 0.08;
    currentColor[1] += (targetColor[1] - currentColor[1]) * 0.08;
    currentColor[2] += (targetColor[2] - currentColor[2]) * 0.08;

    gl.viewport(0, 0, simW, simH);
    gl.disable(gl.BLEND);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fboB.fb);
    bindQuad(advectProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, fboA.tex);
    gl.uniform1i(advectProg.u.uPrev, 0);
    gl.uniform2f(advectProg.u.uTexel, 1 / simW, 1 / simH);
    gl.uniform1f(advectProg.u.uTime, time);
    gl.uniform1f(advectProg.u.uDissipation, CONFIG.dissipation);
    gl.uniform1f(advectProg.u.uDiffusion, CONFIG.diffusion);
    gl.uniform1f(advectProg.u.uFlowStrength, reduceMotion ? 0 : CONFIG.flowStrength);
    gl.uniform1f(advectProg.u.uFlowScale, CONFIG.flowScale);
    gl.uniform1f(advectProg.u.uAspect, aspect);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    if (splats.length) {
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.ONE, gl.ONE);
      bindQuad(splatProg);
      const batch = splats.splice(0, 8);
      for (const [u, v, speed] of batch) {
        gl.uniform2f(splatProg.u.uPoint, u, v);
        gl.uniform1f(splatProg.u.uRadius, CONFIG.splatRadius * (1 + speed * 0.006));
        gl.uniform1f(splatProg.u.uStrength, CONFIG.splatStrength);
        gl.uniform1f(splatProg.u.uAspect, aspect);
        gl.uniform1f(splatProg.u.uSeed, (u * 37.7 + v * 91.3) % 10.0);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
      }
      gl.disable(gl.BLEND);
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    bindQuad(displayProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, fboB.tex);
    gl.uniform1i(displayProg.u.uTex, 0);
    gl.uniform3f(displayProg.u.uColor, currentColor[0], currentColor[1], currentColor[2]);
    gl.uniform1f(displayProg.u.uCurve, CONFIG.densityCurve);
    gl.uniform1f(displayProg.u.uMaxAlpha, CONFIG.maxAlpha);
    gl.uniform1f(displayProg.u.uAspect, canvas.width / canvas.height);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    const t = fboA; fboA = fboB; fboB = t;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* ===================== 基本常數 ===================== */

const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const HOUR_RANGES = ['23:00–00:59','01:00–02:59','03:00–04:59','05:00–06:59','07:00–08:59','09:00–10:59','11:00–12:59','13:00–14:59','15:00–16:59','17:00–18:59','19:00–20:59','21:00–22:59'];

const ELEMENTS = [
  { key: '金', varName: '--el-jin' },
  { key: '木', varName: '--el-mu' },
  { key: '水', varName: '--el-shui' },
  { key: '火', varName: '--el-huo' },
  { key: '土', varName: '--el-tu' },
];

// 只有「主要五行＝火」有定義規則，四類都用原始規則書的固定干支清單比對，
// 不套用五行生克公式（那是先前誤植的假設，非使用者定案的規則）。
const CATS = [
  { key: 'wealth',  label: '得財', varName: '--wealth',  list: new Set(['己丑','辛丑','庚辰','辛酉','庚申','戊申']) },
  { key: 'career',  label: '事業', varName: '--career',  list: new Set(['癸丑','壬子','癸亥','壬申','壬辰']) },
  { key: 'romance', label: '桃花', varName: '--romance', list: new Set(['壬辰','癸亥','壬子','辛亥','庚辰','庚子','癸丑','癸酉','壬申']) },
  { key: 'avoid',   label: '避凶', varName: '--avoid',   list: new Set(['丁巳','丁未','丙戌','丙午']) },
];

const RULES_ELEMENT = '火'; // 目前只有這個五行有定義規則

const MIN_YEAR = 1900;
const MAX_YEAR = 2100;
const TZ_OFFSET_HOURS = 8;

/* ===================== 曆法／天文計算 ===================== */

function mod(n, m) { return ((n % m) + m) % m; }

function toJDN(y, m, d) {
  const a = Math.floor((14 - m) / 12);
  const yy = y + 4800 - a;
  const mm = m + 12 * a - 3;
  return d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
}

function toJulianDay(year, month, day, hour, minute, second) {
  let y = year, m = month;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const utHour = hour - TZ_OFFSET_HOURS;
  const dayFrac = day + (utHour + minute / 60 + second / 3600) / 24;
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + dayFrac + B - 1524.5;
}

function solarLongitude(jd) {
  const T = (jd - 2451545.0) / 36525;
  const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
  const M = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
  const Mrad = M * Math.PI / 180;
  const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mrad)
    + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
    + 0.000289 * Math.sin(3 * Mrad);
  const theta = L0 + C;
  const omega = 125.04 - 1934.136 * T;
  const lambda = theta - 0.00569 - 0.00478 * Math.sin(omega * Math.PI / 180);
  let out = lambda % 360;
  if (out < 0) out += 360;
  return out;
}

function findLongitudeCrossing(jdGuess, targetAngle) {
  let jd = jdGuess;
  for (let i = 0; i < 12; i++) {
    const L = solarLongitude(jd);
    let diff = targetAngle - L;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    if (Math.abs(diff) < 1e-7) break;
    jd += diff / 0.9856;
  }
  return jd;
}

function localGregorianFromJd(jdUT) {
  const jdLocal = jdUT + TZ_OFFSET_HOURS / 24 + 0.5;
  const z = Math.floor(jdLocal);
  let a = z;
  if (z >= 2299161) {
    const alpha = Math.floor((z - 1867216.25) / 36524.25);
    a = z + 1 + alpha - Math.floor(alpha / 4);
  }
  const b = a + 1524;
  const c = Math.floor((b - 122.1) / 365.25);
  const d = Math.floor(365.25 * c);
  const e = Math.floor((b - d) / 30.6001);
  const day = Math.floor(b - d - Math.floor(30.6001 * e));
  const month = (e < 14) ? e - 1 : e - 13;
  const year = (month > 2) ? c - 4716 : c - 4715;
  return { year, month, day };
}

const JIE_TERMS = [
  { name: '立春', angle: 315 }, { name: '驚蟄', angle: 345 }, { name: '清明', angle: 15 },
  { name: '立夏', angle: 45 }, { name: '芒種', angle: 75 }, { name: '小暑', angle: 105 },
  { name: '立秋', angle: 135 }, { name: '白露', angle: 165 }, { name: '寒露', angle: 195 },
  { name: '立冬', angle: 225 }, { name: '大雪', angle: 255 }, { name: '小寒', angle: 285 },
];
const JIE_MEAN_MONTH_DAY = [
  [2, 4], [3, 6], [4, 5], [5, 6], [6, 6], [7, 7],
  [8, 8], [9, 8], [10, 8], [11, 8], [12, 7], [1, 6],
];
const jieCache = new Map();

function getJieTermsForYear(year) {
  if (jieCache.has(year)) return jieCache.get(year);
  const result = JIE_TERMS.map((term, idx) => {
    const [gm, gd] = JIE_MEAN_MONTH_DAY[idx];
    const guessYear = gm === 1 ? year + 1 : year;
    const guessJd = toJulianDay(guessYear, gm, gd, 12, 0, 0);
    const jd = findLongitudeCrossing(guessJd, term.angle);
    const localDate = localGregorianFromJd(jd);
    const jdn = toJDN(localDate.year, localDate.month, localDate.day);
    return { name: term.name, angle: term.angle, jd, jdn, localDate };
  });
  jieCache.set(year, result);
  return result;
}

function getNearbyJieTerms(gregYear) {
  const years = [gregYear - 1, gregYear, gregYear + 1];
  let all = [];
  for (const y of years) all = all.concat(getJieTermsForYear(y));
  all.sort((a, b) => a.jdn - b.jdn);
  return all;
}

/* ===================== 四柱計算 ===================== */

function pillarsForDate(y, m, d) {
  const jdn = toJDN(y, m, d);
  const dayStemIdx = mod(jdn + 9, 10);
  const dayBranchIdx = mod(jdn + 1, 12);

  const jieList = getNearbyJieTerms(y);
  let idxInJie = -1;
  for (let i = 0; i < jieList.length; i++) {
    if (jieList[i].jdn <= jdn) idxInJie = i;
    else break;
  }
  let liChunPos = -1;
  for (let i = idxInJie; i >= 0; i--) {
    if (jieList[i].name === '立春') { liChunPos = i; break; }
  }
  const monthOrder = idxInJie - liChunPos;
  const solarYear = jieList[liChunPos].localDate.year;

  const yearStemIdx = mod(solarYear - 4, 10);
  const yearBranchIdx = mod(solarYear - 4, 12);
  const yinMonthStemIdx = mod((yearStemIdx % 5) * 2 + 2, 10);
  const monthStemIdx = mod(yinMonthStemIdx + monthOrder, 10);
  const monthBranchIdx = mod(2 + monthOrder, 12);

  const mk = (stemIdx, branchIdx) => ({ stemIdx, branchIdx, name: STEMS[stemIdx] + BRANCHES[branchIdx] });
  return {
    year: mk(yearStemIdx, yearBranchIdx),
    month: mk(monthStemIdx, monthBranchIdx),
    day: mk(dayStemIdx, dayBranchIdx),
    dayStemIdx,
  };
}

function hourStemIdx(dayStemIdx, hourBranchIdx) {
  return mod((dayStemIdx % 5) * 2 + hourBranchIdx, 10);
}

function isRulesEnabled(userElement) {
  return userElement === RULES_ELEMENT;
}

function computeCategories(y, m, d, userElement) {
  if (!isRulesEnabled(userElement)) return [];
  const p = pillarsForDate(y, m, d);
  return CATS.map(cat => {
    const list = cat.list;
    const yearMatch = list.has(p.year.name);
    const monthMatch = list.has(p.month.name);
    const dayMatch = list.has(p.day.name);
    let matchedHours = [];
    if (dayMatch) {
      for (let hb = 0; hb < 12; hb++) {
        const si = hourStemIdx(p.dayStemIdx, hb);
        const hourGZ = STEMS[si] + BRANCHES[hb];
        if (list.has(hourGZ)) matchedHours.push({ gz: hourGZ, range: HOUR_RANGES[hb] });
      }
    }
    const hourMatch = matchedHours.length > 0;
    const stars = (yearMatch ? 1 : 0) + (monthMatch ? 1 : 0) + (dayMatch ? 1 : 0) + (hourMatch ? 1 : 0);
    return { ...cat, yearMatch, monthMatch, dayMatch, hourMatch, matchedHours, stars };
  });
}

const elementChipsEl = document.getElementById('element-chips');

function renderElementChips() {
  elementChipsEl.innerHTML = '';
  const activeEl = ELEMENTS.find(e => e.key === state.element);
  if (activeEl && window.wuxingSetInkColor) {

    btn.disabled = isActive;
    if (isActive) {
      btn.style.background = `var(${el.varName})`;
      btn.style.boxShadow = 'inset 2px 2px 3px rgba(0,0,0,0.25), inset -1px -1px 2px rgba(255,255,255,0.15)';

  const opt = document.createElement('option');
  opt.value = String(y);
  opt.textContent = `${y}年`;
  yearSelect.appendChild(opt);

  opt.value = String(m);
  opt.textContent = `${m}月`;
  monthSelect.appendChild(opt);
}
yearSelect.value = String(state.viewYear);
monthSelect.value = String(state.viewMonth);

function goToMonth(year, month) {
  let y = year, m = month;
  if (m < 1) { m = 12; y -= 1; }
  if (m > 12) { m = 1; y += 1; }
  if (y < MIN_YEAR) { y = MIN_YEAR; m = 1; }
  if (y > MAX_YEAR) { y = MAX_YEAR; m = 12; }
  state.viewYear = y;
  state.viewMonth = m;
  yearSelect.value = String(y);
  monthSelect.value = String(m);
  renderCalendar();
}

document.getElementById('prev-month').addEventListener('click', () => goToMonth(state.viewYear, state.viewMonth - 1));
document.getElementById('next-month').addEventListener('click', () => goToMonth(state.viewYear, state.viewMonth + 1));

  state.viewYear = t.getFullYear();
  state.viewMonth = t.getMonth() + 1;
  state.selYear = t.getFullYear();
  state.selMonth = t.getMonth() + 1;
  state.selDay = t.getDate();
  yearSelect.value = String(state.viewYear);
  monthSelect.value = String(state.viewMonth);

monthSelect.addEventListener('change', () => goToMonth(state.viewYear, Number(monthSelect.value)));

/* ===================== 渲染：月曆 ===================== */

const dayGridEl = document.getElementById('day-grid');

function renderCalendar() {
  dayGridEl.innerHTML = '';
  const { viewYear, viewMonth } = state;
  const firstOfMonth = new Date(viewYear, viewMonth - 1, 1);
  const startOffset = firstOfMonth.getDay();
  const gridStart = new Date(viewYear, viewMonth - 1, 1 - startOffset);

  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
    const inMonth = m === viewMonth && y === viewYear;
    const selected = y === state.selYear && m === state.selMonth && day === state.selDay;
    const isToday = y === today.getFullYear() && m === today.getMonth() + 1 && day === today.getDate();

    const cats = computeCategories(y, m, day, state.element).filter(c => c.dayMatch).sort((a, b) => b.stars - a.stars).slice(0, 2);

    const wrap = document.createElement('button');
    wrap.type = 'button';
    wrap.className = 'day-wrap' + (inMonth ? '' : ' out-of-month');

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (selected ? ' selected' : '') + (isToday ? ' today' : '');

    const num = document.createElement('span');
    num.className = 'day-num';
    num.textContent = String(day);
    cell.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    for (const c of cats) {
      const dot = document.createElement('span');
      dot.className = 'day-dot';
      dot.style.background = `var(${c.varName})`;
      dots.appendChild(dot);
    }
    cell.appendChild(dots);
    wrap.appendChild(cell);

    wrap.addEventListener('click', () => {
      state.selYear = y; state.selMonth = m; state.selDay = day;
      renderCalendar();
      renderDetail();
    });
    dayGridEl.appendChild(wrap);
  }
}

/* ===================== 渲染：日期詳情 ===================== */

const detailTitleEl = document.getElementById('detail-title');
const pillarGridEl = document.getElementById('pillar-grid');
const catListEl = document.getElementById('cat-list');

function starIcons(count) {
  return '<span class="icon icon-star"></span>'.repeat(count);
}

function renderDetail() {
  const { selYear: y, selMonth: m, selDay: d } = state;
  detailTitleEl.textContent = `${y}年${m}月${d}日`;

  const p = pillarsForDate(y, m, d);
  pillarGridEl.innerHTML = '';
  [['年柱', p.year], ['月柱', p.month], ['日柱', p.day]].forEach(([label, pillar]) => {
    const chip = document.createElement('div');
    chip.className = 'pillar-chip raised';
    chip.innerHTML = `<span class="pillar-chip-label">${label}</span><span class="pillar-chip-name">${pillar.name}</span>`;
    pillarGridEl.appendChild(chip);
  });

  catListEl.innerHTML = '';

  if (!isRulesEnabled(state.element)) {
    const empty = document.createElement('div');
    empty.className = 'empty-note';
    empty.textContent = `目前僅「火」定義了規則，「${state.element}」尚無得財／桃花／事業／避凶的判斷依據`;
    catListEl.appendChild(empty);
    return;
  }

  const cats = computeCategories(y, m, d, state.element).filter(c => c.stars > 0);

  if (cats.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-note';
    empty.textContent = '此日不符合任何得財／桃花／事業／避凶條件';
    catListEl.appendChild(empty);
    return;
  }

  for (const c of cats) {
    const card = document.createElement('div');
    card.className = 'cat-card raised';
    const color = `var(${c.varName})`;

    const checkRow = (label, active) => `
      <div class="cat-check">
        <span>${label}</span>
        <span class="mark ${active ? 'yes' : 'no'}"><span class="icon ${active ? 'icon-check' : 'icon-cross'}"></span></span>
      </div>`;

    const hoursHtml = c.matchedHours.length ? `
      <div class="cat-hours">
        <div class="cat-sub">符合時辰</div>
        <div class="hour-chips">
          ${c.matchedHours.map(h => `<span class="hour-chip">${h.range}（${h.gz}）</span>`).join('')}
        </div>
      </div>` : '';

    card.innerHTML = `
      <div class="cat-head">
        <span class="cat-name">${c.label}</span>
        <span class="cat-stars" style="color:${color}">${starIcons(c.stars)}</span>
      </div>
      <div class="cat-sub">四柱比對</div>
      <div class="cat-checks">
        ${checkRow('年', c.yearMatch)}
        ${checkRow('月', c.monthMatch)}
        ${checkRow('日', c.dayMatch)}
        ${checkRow('時', c.hourMatch)}
      </div>
      ${hoursHtml}
    `;
    catListEl.appendChild(card);
  }
}

/* ===================== 初始化 ===================== */

renderElementChips();
renderCalendar();
renderDetail();
</script>
